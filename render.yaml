# Render Blueprint — one-click backend deploy.
# In Render: New > Blueprint > point at this repo. Then set the secret env vars
# (ANTHROPIC_API_KEY, BACKEND_API_KEY, CORS_ORIGINS) in the dashboard.
services:
  - type: web
    name: dubaipulse-backend
    runtime: docker
    repo: https://github.com/krish2105/Dubai-Pulse-Analyst-
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # set in dashboard (secret)
      - key: BACKEND_API_KEY
        sync: false            # set in dashboard (secret)
      - key: CORS_ORIGINS
        sync: false            # e.g. https://your-frontend.vercel.app
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: APP_ENV
        value: production
