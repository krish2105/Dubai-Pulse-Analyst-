# Render Blueprint — one-click backend deploy (free LLM via Groq).
# In Render: New > Blueprint > point at this repo. Then set the ONE secret
# env var (GROQ_API_KEY) in the dashboard when prompted.
services:
  - type: web
    name: dubaipulse-backend
    runtime: docker
    repo: https://github.com/krish2105/Dubai-Pulse-Analyst-
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false            # ← set in dashboard (free key: console.groq.com/keys)
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: "*"             # public demo; API is rate-limited
      - key: RATE_LIMIT
        value: 30/minute
      - key: APP_ENV
        value: production
